name: Node.js Test and Deploy to VPS

on:
  push:
    branches:
      - main  # This workflow runs on pushes to the 'main' branch.
env:
  DATABASE_URL: ${{secrets.DATABASE_URL}}

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Specify your Node.js version here

    - name: Install dependencies
      run: npm install


    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
      # Your VPS host address. This should be stored as a GitHub Secret.
        host: ${{ secrets.VPS_HOST }} 
      # Your SSH username.
        username: ${{ secrets.VPS_USERNAME }}

        password: ${{ secrets.SSH_PASSPHRASE }}

      # The SSH private key for authentication. This should also be a Secret.
        key: ${{ secrets.SSH_PRIVATE_KEY }}

      # A list of commands to run on the VPS to pull code and restart the application.
        script: |
          cd /opt/
          git pull origin main
          cd /opt/FutureTech-Admin-API/
          echo ${{ secrets.DATABASE_URL }} >> .env
          echo ${{ secrets.API_KEY_VALUE }} >> .env
          echo ${{ secrets.FRONTEND_URL }} >> .env
          echo ${{ secrets.JWT_EXPIRES_IN }} >> .env
          echo ${{ secrets.JWT_SECRET }} >> .env
          echo ${{ secrets.MAIL_HOST }} >> .env
          echo ${{ secrets.MAIL_PASSWORD }} >> .env
          echo ${{ secrets.MAIL_PORT }} >> .env
          echo ${{ secrets.MAIL_USER }} >> .env
          echo ${{ secrets.REFRESH_TOKEN_EXPIRES_IN }} >> .env
          echo ${{ secrets.SHADOW_DATABASE_URL }} >> .env
          npm install --production && npx prisma generate && npx prisma generate --sql
          npm run build
          pm2 start dist/index.js --name "futuretech-api" --listen 3000


        
