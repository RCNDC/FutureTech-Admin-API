---
deployment:
  tasks:
    - echo "--- Deployment Started ---" > deploy.log
    - /opt/cpanel/ea-nodejs20/bin/npm install >> deploy.log 2>&1
    - /opt/cpanel/ea-nodejs20/bin/npm run build >> deploy.log 2>&1
    - mkdir -p tmp
    - touch tmp/restart.txt
    - echo "--- Deployment Finished ---" >> deploy.log
